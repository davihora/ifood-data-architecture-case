# Baked into the Spark image. The same values are also set in code
# (src/common/spark.py) so local[*] runs work without this file.

# --- Delta Lake (both are mandatory together) ---
spark.sql.extensions                         io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog              org.apache.spark.sql.delta.catalog.DeltaCatalog

# --- s3a -> MinIO ---
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.connection.ssl.enabled   false
spark.hadoop.fs.s3a.access.key               minio
spark.hadoop.fs.s3a.secret.key               minio123
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Driver heap. In local[*] the driver IS the executor, so this single JVM heap caps the
# whole job — the 1g default OOMs on the ~16M-row Delta writes (heap space in the gold write).
# Must live HERE (not in spark.py): the driver JVM's -Xmx is fixed at spark-submit launch,
# so SparkSession.builder.config() can't change it. 4g fits comfortably in the ~8g Colima VM.
spark.driver.memory                          4g

# Quieter, demo-friendly defaults
spark.sql.shuffle.partitions                 8
spark.ui.showConsoleProgress                 true
