# Trino 481 Delta Lake connector over MinIO (native S3 — legacy hive.s3.* was
# removed in release 481). The Hive Metastore records table locations; Trino reads
# the data directly via its native S3 client.
connector.name=delta_lake
hive.metastore.uri=thrift://hive-metastore:9083

fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.region=us-east-1
s3.aws-access-key=minio
s3.aws-secret-key=minio123

# Needed to write/register MinIO-backed Delta tables.
delta.enable-non-concurrent-writes=true
delta.register-table-procedure.enabled=true
