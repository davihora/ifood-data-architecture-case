name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (required by Spark 4.0 / Delta 4.0)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt types-requests

      - name: Lint (ruff + black + mypy)
        run: |
          ruff check src tests analysis orchestration
          black --check src tests analysis orchestration
          mypy src

      - name: Tests (pure-Python + DuckDB oracle + PySpark/Delta)
        run: pytest -m "not integration"
